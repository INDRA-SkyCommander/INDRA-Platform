# Center frequency to jam in Hz
freq: 2.45e9

# Enter Jammer transmit power in dBm (Min = -40dBm, Max = 13dBm) | default = 6dBm
power: 13

# Sample rate for SDR, defines the width of the jamming signal (Max = 20e6)
samp_rate: 20e6

# Hardware bandwidth of SDR. Should at least match sample rate
samp_bandwidth: 20e6

# Enter channel jamming duration in sec | default = 10s
t_jamming: 360

# freq: 2462 # This option only applies to constant jammer
 
